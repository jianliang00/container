name: container project - common jobs

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      release:
        type: boolean
        description: "Publish this build for release"
        default: false
      sign_release_artifacts:
        type: boolean
        description: "Sign the release installer package with Developer ID certificates"
        default: false
      notarize_release_artifacts:
        type: boolean
        description: "Submit the signed release installer package for notarization"
        default: false
      skip_virtualization_tests:
        type: boolean
        description: "Skip tests that require guest VM virtualization"
        default: false
      verify_swiftpm_consumer:
        type: boolean
        description: "Verify ContainerKit products can be consumed from an external Swift package"
        default: false

jobs:
  buildAndTest:
    name: Build and test the project
    timeout-minutes: 60
    runs-on: macos-26
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Resolve Xcode developer directory
        run: |
          echo "DEVELOPER_DIR=$(/usr/bin/xcode-select -p)" >> "$GITHUB_ENV"
          /usr/bin/xcodebuild -version

      - name: Check formatting
        run: |
          ./scripts/install-hawkeye.sh
          make fmt

          if ! git diff --quiet -- . ; then
            echo "❌ The following files require formatting or license header updates:"
            git diff --name-only -- .
            false
          fi

      - name: Check protobuf
        run: |
          make protos
          if ! git diff --quiet -- . ; then
            echo "❌ The following files require formatting or license header updates:"
            git diff --name-only -- .
            false
          fi

      - name: Set build configuration
        run: |
          echo "BUILD_CONFIGURATION=debug" >> $GITHUB_ENV
          if [[ "${{ inputs.release }}" == "true" ]]; then
            echo "BUILD_CONFIGURATION=release" >> $GITHUB_ENV
          fi

      - name: Set package artifact name
        run: |
          echo "PACKAGE_ARTIFACT_NAME=container-installer-unsigned.pkg" >> "$GITHUB_ENV"
          if [[ "${{ inputs.sign_release_artifacts }}" == "true" ]]; then
            echo "PACKAGE_ARTIFACT_NAME=container-installer.pkg" >> "$GITHUB_ENV"
          fi

      - name: Validate release signing inputs
        if: ${{ inputs.sign_release_artifacts }}
        env:
          APP_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_P12_BASE64 }}
          APP_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          APP_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          INSTALLER_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_P12_BASE64 }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD }}
          INSTALLER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_IDENTITY }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          required_values=(
            APP_CERTIFICATE
            APP_CERTIFICATE_PASSWORD
            APP_IDENTITY
            INSTALLER_CERTIFICATE
            INSTALLER_CERTIFICATE_PASSWORD
            INSTALLER_IDENTITY
          )
          if [[ "${{ inputs.notarize_release_artifacts }}" == "true" ]]; then
            required_values+=(
              APP_STORE_CONNECT_API_KEY
              APP_STORE_CONNECT_API_KEY_ID
              APP_STORE_CONNECT_API_ISSUER_ID
            )
          fi

          for value_name in "${required_values[@]}"; do
            if [[ -z "${!value_name}" ]]; then
              echo "::error::Missing required secret ${value_name}"
              exit 1
            fi
          done

      - name: Import Apple Developer ID certificates
        if: ${{ inputs.sign_release_artifacts }}
        env:
          APP_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_P12_BASE64 }}
          APP_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          APP_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          INSTALLER_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_P12_BASE64 }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD }}
          INSTALLER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_IDENTITY }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/container-release-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          APP_CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id-application.p12"
          INSTALLER_CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id-installer.p12"

          python3 -c 'import base64, pathlib, sys; pathlib.Path(sys.argv[1]).write_bytes(base64.b64decode(sys.stdin.read()))' "${APP_CERTIFICATE_PATH}" <<< "${APP_CERTIFICATE}"
          python3 -c 'import base64, pathlib, sys; pathlib.Path(sys.argv[1]).write_bytes(base64.b64decode(sys.stdin.read()))' "${INSTALLER_CERTIFICATE_PATH}" <<< "${INSTALLER_CERTIFICATE}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -d user -s "${KEYCHAIN_PATH}"

          security import "${APP_CERTIFICATE_PATH}" -k "${KEYCHAIN_PATH}" -P "${APP_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/xcrun
          security import "${INSTALLER_CERTIFICATE_PATH}" -k "${KEYCHAIN_PATH}" -P "${INSTALLER_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

          echo "CODESIGN_IDENTITY=${APP_IDENTITY}" >> "$GITHUB_ENV"
          echo "CODESIGN_TIMESTAMP_OPTS=--timestamp" >> "$GITHUB_ENV"
          echo "CODESIGN_EXTRA_OPTS=--options runtime" >> "$GITHUB_ENV"
          echo "CODESIGN_KEYCHAIN=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"
          echo "PKG_SIGN_IDENTITY=${INSTALLER_IDENTITY}" >> "$GITHUB_ENV"
          echo "PKG_SIGN_TIMESTAMP_OPTS=--timestamp" >> "$GITHUB_ENV"
          echo "PKG_SIGN_KEYCHAIN=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"

      - name: Make the container project and docs
        run: |
          make container dsym docs PKG_PATH="bin/${{ env.BUILD_CONFIGURATION }}/${{ env.PACKAGE_ARTIFACT_NAME }}"
          tar cfz _site.tgz _site

      - name: Verify signed installer package
        if: ${{ inputs.sign_release_artifacts }}
        run: |
          pkgutil --check-signature "bin/${{ env.BUILD_CONFIGURATION }}/${{ env.PACKAGE_ARTIFACT_NAME }}"

      - name: Notarize signed installer package
        if: ${{ inputs.notarize_release_artifacts }}
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          API_KEY_PATH="${RUNNER_TEMP}/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          python3 -c 'import base64, pathlib, sys; pathlib.Path(sys.argv[1]).write_bytes(base64.b64decode(sys.stdin.read()))' "${API_KEY_PATH}" <<< "${APP_STORE_CONNECT_API_KEY}"

          xcrun notarytool submit "bin/${{ env.BUILD_CONFIGURATION }}/${{ env.PACKAGE_ARTIFACT_NAME }}" \
            --key "${API_KEY_PATH}" \
            --key-id "${APP_STORE_CONNECT_API_KEY_ID}" \
            --issuer "${APP_STORE_CONNECT_API_ISSUER_ID}" \
            --wait

          xcrun stapler staple "bin/${{ env.BUILD_CONFIGURATION }}/${{ env.PACKAGE_ARTIFACT_NAME }}"
          spctl -a -vv --type install "bin/${{ env.BUILD_CONFIGURATION }}/${{ env.PACKAGE_ARTIFACT_NAME }}"

      - name: Verify SwiftPM consumer integration
        if: ${{ inputs.verify_swiftpm_consumer }}
        run: ./scripts/verify-swiftpm-consumer.sh

      - name: Create package
        run: |
          mkdir -p outputs
          mv "bin/${{ env.BUILD_CONFIGURATION }}/${{ env.PACKAGE_ARTIFACT_NAME }}" outputs
          mv bin/${{ env.BUILD_CONFIGURATION }}/bundle/container-dSYM.zip outputs

      - name: Test the container project
        env:
          CONTAINER_SKIP_VIRTUALIZATION_TESTS: ${{ inputs.skip_virtualization_tests && '1' || '0' }}
          CONTAINER_FORCE_DISABLE_CLI_TESTS: ${{ inputs.skip_virtualization_tests && '1' || '0' }}
        run: |
          APP_ROOT=$(mktemp -d -p "${RUNNER_TEMP}")
          trap 'rm -rf "${APP_ROOT}"; echo Removing data directory ${APP_ROOT}' EXIT
          echo "Created data directory ${APP_ROOT}"
          export NO_PROXY="${NO_PROXY},192.168.0.0/16,fe80::/10"
          echo NO_PROXY=${NO_PROXY}
          export no_proxy="${no_proxy},192.168.0.0/16,fe80::/10"
          echo no_proxy=${no_proxy}
          make APP_ROOT="${APP_ROOT}" test install-kernel integration

      - name: Save documentation artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: api-docs
          path: "./_site.tgz"
          retention-days: 14

      - name: Save package artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: container-package
          path: ${{ github.workspace }}/outputs

  uploadPages:
    # Separate upload step required because upload-pages-artifact needs
    # gtar which is not on the macOS runner.
    name: Upload artifact for GitHub Pages
    needs: buildAndTest
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download a single artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: api-docs

      - name: Add API docs to documentation
        run: |
          tar xfz _site.tgz

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./_site"
