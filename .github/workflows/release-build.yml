name: container project - manual signed release build

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  build:
    name: Invoke build and release
    uses: ./.github/workflows/common.yml
    with:
      release: true
      sign_release_artifacts: true
      notarize_release_artifacts: true
      skip_virtualization_tests: true
      verify_swiftpm_consumer: true
    secrets: inherit
    permissions:
      contents: read
      packages: read
      pages: write

  release:
    if: startsWith(github.ref, 'refs/tags/')
    name: Publish release
    timeout-minutes: 30
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
      pages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: outputs

      - name: Verify artifacts exist
        run: |
          echo "Checking for expected artifacts..."
          ls -la outputs/container-package/
          test -e outputs/container-package/*.zip || (echo "Missing .zip file!" && exit 1)
          test -e outputs/container-package/*.pkg || (echo "Missing .pkg file!" && exit 1)

      - name: Generate release notes
        run: ./scripts/generate-swiftpm-release-notes.sh "${GITHUB_REF_NAME}" > release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          token: ${{ github.token }}
          name: ${{ github.ref_name }}-prerelease
          draft: true
          make_latest: false
          prerelease: true
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            outputs/container-package/*.zip
            outputs/container-package/*.pkg
